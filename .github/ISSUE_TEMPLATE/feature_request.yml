name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Target package
      options: [shared, proxy, ops, contracts, root, new package]
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
