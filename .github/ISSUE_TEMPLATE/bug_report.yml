name: Bug Report
description: Report a bug in Vanta-Key
labels: ["bug"]
body:
  - type: dropdown
    id: package
    attributes:
      label: Affected package
      options: [shared, proxy, ops, contracts, root]
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
